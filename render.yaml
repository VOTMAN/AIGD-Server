services:
  - type: web
    name: aipro-server
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATA_DIR
        value: /data
      - key: DB_PATH
        value: /data/results.db
      - key: CORS_ORIGINS
        value: http://localhost:5173,https://your-frontend.onrender.com
      - key: REQUEST_TIMEOUT
        value: "120"
      - key: PYTHONUNBUFFERED
        value: "1"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
